<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO básico -->
  <title>{{ site.title }}</title>
  <meta name="description" content="Advogada especialista em Direito Imobiliário na Grande Vitória — ES. Atendimento online para todo o Brasil. Direito Civil, Penal, Família e Consultoria Jurídica. OAB/ES 44.058." />
  <meta name="keywords" content="advogada vitória es, advogada espírito santo, direito imobiliário vitória, advogada online brasil, direito de família es, consultoria jurídica, lorrana veloso advogada" />
  <link rel="canonical" href="{{ site.url }}" />

  <!-- Open Graph — WhatsApp, Facebook, LinkedIn -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="{{ site.url }}" />
  <meta property="og:title" content="Lorrana O. Veloso — Advogada | Direito Imobiliário · Grande Vitória ES" />
  <meta property="og:description" content="Especialista em Direito Imobiliário na Grande Vitória — ES. Atendimento presencial e online para todo o Brasil. Defendo seus interesses com empatia e estratégia." />
  <meta property="og:image" content="{{ site.url }}/assets/images/lorrana-veloso.jpg" />
  <meta property="og:locale" content="pt_BR" />
  <meta property="og:site_name" content="Lorrana O. Veloso — Advogada" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Lorrana O. Veloso — Advogada" />
  <meta name="twitter:description" content="Especialista em Direito Imobiliário na Grande Vitória — ES. Atendimento online para todo o Brasil." />
  <meta name="twitter:image" content="{{ site.url }}/assets/images/lorrana-veloso.jpg" />

  <!-- Schema.org — LegalService -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "LegalService",
    "name": "Lorrana O. Veloso — Advogada",
    "description": "Advogada especialista em Direito Imobiliário com atendimento na Grande Vitória — ES e online para todo o Brasil.",
    "url": "{{ site.url }}",
    "telephone": "+55{{ site.advogada.whatsapp }}",
    "email": "{{ site.advogada.email }}",
    "image": "{{ site.url }}/assets/images/lorrana-veloso.jpg",
    "priceRange": "$$",
    "areaServed": [
      {
        "@type": "State",
        "name": "Espírito Santo"
      },
      {
        "@type": "Country",
        "name": "Brasil"
      }
    ],
    "address": {
      "@type": "PostalAddress",
      "addressRegion": "ES",
      "addressLocality": "Grande Vitória",
      "addressCountry": "BR"
    },
    "hasOfferCatalog": {
      "@type": "OfferCatalog",
      "name": "Áreas de Atuação",
      "itemListElement": [
        { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Direito Imobiliário" } },
        { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Direito Civil" } },
        { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Direito Penal" } },
        { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Direito de Família" } },
        { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Extrajudicial" } },
        { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Consultoria Jurídica" } }
      ]
    },
    "sameAs": [
      "https://www.instagram.com/lorranaveloso.adv"
    ]
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
</head>
<body>
  {% include nav.html %}
  {{ content }}
  {% include footer.html %}
</body>
</html>
